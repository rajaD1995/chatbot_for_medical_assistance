# ============================================================
# CI/CD PIPELINE: Deploy Docker App to AWS ECR + EC2
# ============================================================
# TRIGGER: Automatic on push to main branch
# FLOW: Builds image → Pushes to ECR → Deploys to EC2
# ============================================================

name: Deploy Application Docker Image to EC2 instance

on:
  push:
    branches: [main]                      # 🔧 Change branch name if needed

jobs:
  # ============================================================
  # JOB 1: BUILD & PUSH TO AWS ECR
  # Runs on: GitHub servers (free)
  # ============================================================
  Continuous-Integration:
    runs-on: ubuntu-latest

    steps:
      # Downloads your code from GitHub
      - name: Checkout
        uses: actions/checkout@v2           # ⚠️ Update to @v4 when convenient

      # Authenticates with AWS using secrets
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1   # ⚠️ Update to @v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      # Logs Docker into Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1            # ⚠️ Update to @v2

      # Builds Docker image and pushes to ECR
      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPO }}        # 🔧 Your ECR repo name
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .  
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "::set-output name=image::$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"   # ⚠️ Deprecated syntax

  # ============================================================
  # JOB 2: DEPLOY TO EC2
  # Runs on: YOUR EC2 instance (requires self-hosted runner)
  # ============================================================
  Continuous-Deployment:
    needs: Continuous-Integration          # Waits for Job 1 to complete
    runs-on: self-hosted                   # 🔧 Your EC2 must have runner installed

    steps:
      - name: Checkout
        uses: actions/checkout@v3           # ⚠️ Update to @v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1   # ⚠️ Update to @v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1            # ⚠️ Update to @v2

      # Pulls image from ECR and runs container on EC2
      - name: Run Docker Image to serve users
        run: |
         docker run -d \
           -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
           -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
           -e AWS_DEFAULT_REGION="${{ secrets.AWS_DEFAULT_REGION }}" \
           -e PINECONE_API_KEY="${{ secrets.PINECONE_API_KEY }}" \
           -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
           -p 8080:8080 \                                 # 🔧 Change port if needed
           "${{ steps.login-ecr.outputs.registry }}"/"${{ secrets.ECR_REPO }}":latest